<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Elemix Playground</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <style>
            html {
                background: #060a16;
            }
        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/style.css" />
    </head>
    <body>
        <div id="app">
            <header id="toolbar">
                <span class="brand">
                    <img class="brand-mark" src="/logo.svg" alt="" width="38" height="38" />
                    <span class="brand-name">elemix</span>
                    <span class="brand-version" id="brand-version"></span>
                </span>

                <div class="app-select" id="app-select">
                    <button class="app-trigger" id="app-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="app-prefix">Example</span>
                        <span class="app-trigger-label" id="app-current">Counter</span>
                        <span class="app-caret">▾</span>
                    </button>
                    <div class="app-menu" id="app-menu" role="listbox" hidden></div>
                </div>

                <div class="spacer"></div>
                <a
                    class="gh-link"
                    href="https://github.com/neuralfog/elemix"
                    target="_blank"
                    rel="noopener"
                    aria-label="GitHub"
                >
                    <svg class="gh-icon" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
                        />
                    </svg>
                </a>
                <a
                    class="site-link"
                    href="https://gitgood.sh"
                    target="_blank"
                    rel="noopener"
                    ><span class="by">developed with 💙 by </span
                    ><span class="path"
                        ><span class="tilde">~</span>/gitgood.sh</span
                    ></a
                >
                <label class="auto-toggle">
                    <input type="checkbox" id="auto-run" checked />
                    Auto-run
                </label>
                <button id="run-btn" title="Run (Ctrl/Cmd+Enter)">Run</button>
            </header>
            <main id="workspace">
                <nav id="filetree"></nav>
                <section id="editor-pane">
                    <div id="tabs"></div>
                    <div id="editor"></div>
                </section>
                <div id="divider"></div>
                <section id="preview-pane">
                    <div id="preview-header">Preview</div>
                    <iframe id="preview" title="preview" sandbox="allow-scripts allow-modals allow-same-origin allow-forms"></iframe>
                    <div id="console-divider"></div>
                    <div id="console-panel">
                        <div id="console-header">
                            <button id="toggle-console" class="console-toggle" title="Hide console" aria-label="Toggle console">▾</button>
                            <span class="console-title">Console</span>
                            <span id="console-count" class="console-count"></span>
                            <div class="spacer"></div>
                            <button id="clear-console" title="Clear console">Clear</button>
                        </div>
                        <div id="console"></div>
                    </div>
                </section>
            </main>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
